name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  CLOUD_RUN_REGION: asia-northeast1
  CLOUD_RUN_SERVICE: dashboard-backend

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build & push image
        run: |
          gcloud builds submit \
            --tag "${CLOUD_RUN_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/dashboard/${CLOUD_RUN_SERVICE}:${{ github.sha }}" \
            --project "${GCP_PROJECT_ID}"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${CLOUD_RUN_SERVICE}" \
            --image "${CLOUD_RUN_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/dashboard/${CLOUD_RUN_SERVICE}:${{ github.sha }}" \
            --region "${CLOUD_RUN_REGION}" \
            --project "${GCP_PROJECT_ID}" \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "GCP_PROJECT_ID=${GCP_PROJECT_ID},GOOGLE_OAUTH_CLIENT_ID=${{ secrets.GOOGLE_OAUTH_CLIENT_ID }},OAUTH_REDIRECT_URI=${{ secrets.OAUTH_REDIRECT_URI }},NODE_ENV=production" \
            --service-account "${{ secrets.CLOUD_RUN_SA }}"

  deploy-hosting:
    runs-on: ubuntu-latest
    needs: deploy-backend
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Write app-config.js from secret
        run: |
          cat > app-config.js <<'EOF'
          ${{ secrets.APP_CONFIG_JS }}
          EOF

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.GCP_PROJECT_ID }}
          channelId: live
